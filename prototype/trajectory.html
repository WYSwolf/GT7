<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>進步軌跡(每日)— GT7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg-base:#0a0d12; --bg-panel:#131820; --bg-input:#0f141b;
    --line:#2a3340; --line-bright:#3d4856;
    --text-primary:#e8ecf1; --text-secondary:#8b96a8; --text-dim:#5a6577;
    --accent:#00ff88; --danger:#ff4757;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg-base);color:var(--text-primary);
    font-family:'Noto Sans TC','JetBrains Mono',sans-serif;padding:16px;padding-bottom:48px;}
  .wrap{max-width:760px;margin:0 auto}
  .proto-tag{display:inline-block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
    color:#ff8c42;border:1px solid #ff8c42;border-radius:4px;padding:2px 8px;margin-bottom:12px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.02em;line-height:1}
  .sub{color:var(--text-secondary);font-size:.85rem;margin:6px 0 14px}
  .spectrum{display:flex;align-items:center;gap:10px;font-size:.76rem;color:var(--text-secondary);margin-bottom:18px;flex-wrap:wrap}
  .bar{height:10px;width:160px;border-radius:5px;background:linear-gradient(90deg,#ff8c42,#586577,#00ff88)}
  .panel{background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:16px}
  .ptitle{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:.03em;display:flex;justify-content:space-between;align-items:baseline}
  .ptitle .meta{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-secondary);letter-spacing:0}
  .chart-wrap{position:relative;height:300px;margin-top:8px}
  .note{margin-top:6px;color:var(--text-dim);font-size:.72rem;line-height:1.7}
  .loading{text-align:center;color:var(--text-secondary);padding:60px 0}
</style>
</head>
<body>
<div class="wrap">
  <span class="proto-tag">Prototype · 每日進步軌跡</span>
  <h1>進步軌跡（每日）</h1>
  <div class="sub">每天一個點 · X = 當日最佳距 WR % · Y = 當日「中位 − 最佳」秒 · 連線是時間順序<br>一張圖一個賽道 · 只標最後一天(白點)</div>
  <div class="spectrum">
    <span style="color:#ff8c42">退步</span>
    <span class="bar"></span>
    <span style="color:var(--accent)">進步</span>
    <span>— 線段顏色看「往左下(更快更穩)還是往右上移」</span>
  </div>
  <div id="charts"><div class="loading">載入中…</div></div>
</div>

<script>
const PROG = '#00ff88', MID = '#586577', REG = '#ff8c42', WHITE = '#e8ecf1';
const fmt = s => { if (s == null) return '—'; const m = Math.floor(s / 60); return m + ':' + (s - 60 * m).toFixed(3).padStart(6, '0'); };
const median = a => { const s = [...a].sort((x, y) => x - y); const m = Math.floor((s.length - 1) / 2); return s.length % 2 ? s[m] : (s[m] + s[m + 1]) / 2; };
const hx = h => { h = h.replace('#', ''); return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)]; };
// returns an "r,g,b" triplet (no wrapper) so an alpha can be appended later
const lerp = (a, b, t) => { const A = hx(a), B = hx(b); return `${Math.round(A[0]+(B[0]-A[0])*t)},${Math.round(A[1]+(B[1]-A[1])*t)},${Math.round(A[2]+(B[2]-A[2])*t)}`; };

fetch('../data.json').then(r => r.json()).then(D => {
  const refs = (D.meta && D.meta.references) || {};
  const carSlug = c => (c || '').replace(/[^a-z0-9]+/gi, '').toLowerCase();
  const groups = {};
  D.sessions.forEach(s => {
    (groups[s.trackKey] = groups[s.trackKey] || { track: s.track, trackEn: s.trackEn, car: s.car, carSlug: s.carSlug || carSlug(s.car), sessions: [] }).sessions.push(s);
  });
  const tracks = Object.values(groups).map(g => {
    if (!g.carSlug) { const s = g.sessions.find(x => x.carSlug); if (s) g.carSlug = s.carSlug; }
    g.wr = (refs[g.carSlug] || {}).time;
    g.last = g.sessions.map(s => s.date).sort().slice(-1)[0] || '';
    return g;
  }).filter(g => g.wr).sort((a, b) => b.last.localeCompare(a.last));

  // per-day points for one track
  function dayPoints(g) {
    const byDate = {};
    g.sessions.forEach(s => { (byDate[s.date] = byDate[s.date] || []).push(...s.laps.filter(l => !l.invalid)); });
    return Object.keys(byDate).sort().map(date => {
      const v = byDate[date].map(l => l.total); const best = Math.min(...v);
      return { date, x: +(((best - g.wr) / g.wr) * 100).toFixed(3), y: +(median(v) - best).toFixed(3), best, n: v.length };
    });
  }

  const host = document.getElementById('charts');
  host.innerHTML = '';
  tracks.forEach((g, ti) => {
    const pts = dayPoints(g);
    const panel = document.createElement('div');
    panel.className = 'panel';
    const last = pts[pts.length - 1];
    panel.innerHTML = `<div class="ptitle"><span>${g.trackEn || g.track}</span><span class="meta">WR ${fmt(g.wr)} · ${pts.length} 天</span></div>
      <div class="chart-wrap"><canvas id="c${ti}"></canvas></div>
      <div class="note">最新(${last.date}):+${last.x.toFixed(2)}% / 中位−最佳 ${last.y.toFixed(3)}s</div>`;
    host.appendChild(panel);

    // progress per segment (normalised so both axes weigh equally), green=toward bottom-left
    const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
    const xmn = Math.min(...xs), xmx = Math.max(...xs), ymn = Math.min(...ys), ymx = Math.max(...ys);
    const nx = v => xmx > xmn ? (v - xmn) / (xmx - xmn) : 0;
    const ny = v => ymx > ymn ? (v - ymn) / (ymx - ymn) : 0;
    const prog = pts.map((p, i) => i === 0 ? 0 : (nx(pts[i-1].x) + ny(pts[i-1].y)) - (nx(p.x) + ny(p.y)));
    const maxAbs = Math.max(...prog.map(Math.abs), 1e-9);
    const n = pts.length;
    // per-NODE spectrum colour (triplet) from the step arriving at that node; node 0 neutral
    const cl = v => Math.max(-1, Math.min(1, v));
    const nodeRGB = prog.map((d, i) => i === 0 ? lerp(MID, MID, 0) : (d >= 0 ? lerp(MID, PROG, cl(d / maxAbs)) : lerp(MID, REG, cl(-d / maxAbs))));
    const nodeA = pts.map((_, i) => n < 2 ? 1 : 0.12 + 0.88 * Math.pow(i / (n - 1), 1.4));   // older → fainter
    // Catmull-Rom densify so colour blends continuously between nodes (and the curve stays圓滑)
    const X = pts.map(p => p.x), Y = pts.map(p => p.y);
    const at = (a, i) => a[Math.max(0, Math.min(a.length - 1, i))];
    const cr = (p0, p1, p2, p3, t) => { const t2 = t*t, t3 = t2*t; return 0.5 * (2*p1 + (-p0+p2)*t + (2*p0-5*p1+4*p2-p3)*t2 + (-p0+3*p1-3*p2+p3)*t3); };
    const blend = (c1, c2, t) => { const A = c1.split(',').map(Number), B = c2.split(',').map(Number); return `${Math.round(A[0]+(B[0]-A[0])*t)},${Math.round(A[1]+(B[1]-A[1])*t)},${Math.round(A[2]+(B[2]-A[2])*t)}`; };
    const K = 18, dense = [], dcol = [];
    for (let i = 0; i < n - 1; i++) {
      for (let j = 0; j < K; j++) {
        const t = j / K;
        dense.push({ x: cr(at(X,i-1),X[i],X[i+1],at(X,i+2),t), y: cr(at(Y,i-1),Y[i],Y[i+1],at(Y,i+2),t) });
        dcol.push(`rgba(${blend(nodeRGB[i], nodeRGB[i+1], t)},${(nodeA[i] + (nodeA[i+1]-nodeA[i])*t).toFixed(3)})`);
      }
    }
    dense.push({ x: X[n-1], y: Y[n-1] }); dcol.push(`rgba(${nodeRGB[n-1]},${nodeA[n-1].toFixed(3)})`);

    new Chart(document.getElementById('c' + ti), {
      type: 'line',
      data: { datasets: [
        { // gradient trajectory (densified)
          data: dense, showLine: true, borderWidth: 2.5, tension: 0,
          borderCapStyle: 'round', borderJoinStyle: 'round',
          segment: { borderColor: ctx => dcol[ctx.p1DataIndex] || 'rgba(88,101,119,1)' },
          pointRadius: 0, pointHoverRadius: 0
        },
        { // real day points: invisible hit-targets for tooltip + white last-day dot
          data: pts.map(p => ({ x: p.x, y: p.y, _p: p })), showLine: false,
          pointRadius: pts.map((_, i) => i === n - 1 ? 5 : 0), pointHitRadius: 14, pointHoverRadius: 7,
          pointBackgroundColor: WHITE, pointBorderColor: WHITE
        }
      ] },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'nearest', intersect: true },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a2029', borderColor: '#3d4856', borderWidth: 1,
            filter: item => item.datasetIndex === 1,
            callbacks: {
              title: ctx => ctx[0].raw._p ? ctx[0].raw._p.date : '',
              label: ctx => { const p = ctx.raw._p; return p ? [`vs WR: +${p.x.toFixed(2)}%  (${fmt(p.best)})`, `中位−最佳: ${p.y.toFixed(3)}s`, `${p.n} 有效圈`] : ''; }
            }
          }
        },
        scales: {
          x: { type: 'linear', title: { display: true, text: '距 WR %  →（越左越快）', color: '#8b96a8', font: { size: 10 } },
               grid: { color: 'rgba(42,51,64,0.5)' }, ticks: { color: '#8b96a8', callback: v => '+' + v.toFixed(1) + '%' } },
          y: { title: { display: true, text: '中位−最佳 秒  ↓（越穩）', color: '#8b96a8', font: { size: 10 } },
               grid: { color: 'rgba(42,51,64,0.5)' }, ticks: { color: '#8b96a8', callback: v => v.toFixed(2) + 's' }, beginAtZero: true }
        }
      }
    });
  });
}).catch(e => { document.getElementById('charts').innerHTML = '<div class="loading">讀取失敗:' + e + '</div>'; });
</script>
</body>
</html>
