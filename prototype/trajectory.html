<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>進步軌跡 · vs WR × 一致性帶 — GT7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg-base:#0a0d12; --bg-panel:#131820; --bg-input:#0f141b;
    --line:#2a3340; --line-bright:#3d4856;
    --text-primary:#e8ecf1; --text-secondary:#8b96a8; --text-dim:#5a6577;
    --accent:#00ff88; --warn:#ff8c42; --info:#4dabf7; --purple:#c266ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg-base);color:var(--text-primary);
    font-family:'Noto Sans TC','JetBrains Mono',sans-serif;padding:16px;padding-bottom:48px;}
  .wrap{max-width:760px;margin:0 auto}
  .proto-tag{display:inline-block;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
    color:var(--warn);border:1px solid var(--warn);border-radius:4px;padding:2px 8px;margin-bottom:12px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.02em;line-height:1}
  .sub{color:var(--text-secondary);font-size:.85rem;margin:6px 0 16px}
  .panel{background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .chart-wrap{position:relative;height:62vh;min-height:420px}
  .hint{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:.74rem;color:var(--text-secondary)}
  .hint b{color:var(--accent)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}
  .lg{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-secondary)}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block}
  .note{margin-top:16px;color:var(--text-dim);font-size:.72rem;line-height:1.7}
  .loading{text-align:center;color:var(--text-secondary);padding:60px 0}
</style>
</head>
<body>
<div class="wrap">
  <span class="proto-tag">Prototype · 進步軌跡</span>
  <h1>進步軌跡圖</h1>
  <div class="sub">X = 距世界紀錄 %(越左越接近 WR)· Y = 一致性帶 中位−最速 秒(越低越穩)<br>每個點是一場,連線是時間順序 —— <b style="color:var(--accent)">往左下移動 = 又快又穩</b></div>
  <div class="panel">
    <div class="chart-wrap"><canvas id="traj"></canvas></div>
    <div class="legend" id="legend"></div>
    <div class="hint">
      <span>◜ <b>左下角</b> = 理想(貼 WR + 高度一致)</span>
      <span>↘ 右上 = 又慢又飄</span>
      <span>○ 小點=舊場 · ●大點=最新場</span>
    </div>
  </div>
  <div class="note" id="note"></div>
</div>

<script>
const PALETTE = ['#00ff88', '#ed7d31', '#4dabf7', '#c266ff', '#ffd43b'];
const fmt = s => { if (s == null) return '—'; const m = Math.floor(s / 60); return m + ':' + (s - 60 * m).toFixed(3).padStart(6, '0'); };
const median = a => { const s = [...a].sort((x, y) => x - y); const m = Math.floor((s.length - 1) / 2); return s.length % 2 ? s[m] : (s[m] + s[m + 1]) / 2; };
function hexA(hex, a) { const h = hex.replace('#', ''); return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a.toFixed(3)})`; }

fetch('../data.json').then(r => r.json()).then(D => {
  const refs = (D.meta && D.meta.references) || {};
  const carSlug = c => (c || '').replace(/[^a-z0-9]+/gi, '').toLowerCase();
  // group by track, keep only tracks with a WR reference
  const groups = {};
  D.sessions.forEach(s => {
    (groups[s.trackKey] = groups[s.trackKey] || { track: s.track, car: s.car, carSlug: s.carSlug || carSlug(s.car), sessions: [] }).sessions.push(s);
  });
  const tracks = Object.values(groups).map(g => {
    if (!g.carSlug) { const s = g.sessions.find(x => x.carSlug); if (s) g.carSlug = s.carSlug; }
    g.wr = (refs[g.carSlug] || {}).time;
    g.sessions.sort((a, b) => a.date !== b.date ? a.date.localeCompare(b.date) : (a.session || '').localeCompare(b.session || ''));
    g.last = g.sessions[g.sessions.length - 1].date;
    return g;
  }).filter(g => g.wr && g.sessions.length >= 1)
    .sort((a, b) => b.last.localeCompare(a.last));   // newest track first → gets PALETTE[0]

  const datasets = [], legend = [];
  tracks.forEach((g, ti) => {
    const color = PALETTE[ti % PALETTE.length];
    const pts = g.sessions.map(s => {
      const v = s.laps.filter(l => !l.invalid).map(l => l.total);
      const best = Math.min(...v);
      return { x: +(((best - g.wr) / g.wr) * 100).toFixed(3), y: +(median(v) - best).toFixed(3), s, best };
    });
    const n = pts.length;
    const ptCol = pts.map((_, i) => hexA(color, n < 2 ? 1 : 0.25 + 0.75 * (i / (n - 1))));
    const ptRad = pts.map((_, i) => i === n - 1 ? 6.5 : 3.5);
    datasets.push({
      label: g.track, data: pts, showLine: true,
      borderColor: hexA(color, 0.35), borderWidth: 2, tension: 0.25,
      pointBackgroundColor: ptCol, pointBorderColor: ptCol, pointBorderWidth: 0,
      pointRadius: ptRad, pointHoverRadius: 9, _g: g
    });
    legend.push(`<span class="lg"><span class="dot" style="background:${color}"></span>${g.track} · WR ${fmt(g.wr)}</span>`);
  });
  document.getElementById('legend').innerHTML = legend.join('');

  new Chart(document.getElementById('traj'), {
    type: 'scatter',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a2029', borderColor: '#3d4856', borderWidth: 1,
          callbacks: {
            title: ctx => ctx[0].dataset.label,
            label: ctx => {
              const p = ctx.raw;
              return [`${p.s.sessionLabel || p.s.date}`, `vs WR: +${p.x.toFixed(2)}%  (${fmt(p.best)})`, `一致性帶: ${p.y.toFixed(3)}s`];
            }
          }
        }
      },
      scales: {
        x: { title: { display: true, text: '距世界紀錄 %  →（越左越快）', color: '#8b96a8', font: { size: 11 } },
             grid: { color: 'rgba(42,51,64,0.5)' }, ticks: { color: '#8b96a8', callback: v => '+' + v.toFixed(1) + '%' } },
        y: { title: { display: true, text: '一致性帶 中位−最速 秒  ↓（越低越穩）', color: '#8b96a8', font: { size: 11 } },
             grid: { color: 'rgba(42,51,64,0.5)' }, ticks: { color: '#8b96a8', callback: v => v.toFixed(2) + 's' }, beginAtZero: true }
      }
    }
  });

  // textual read of the newest point per track
  document.getElementById('note').innerHTML = '最新一場位置:' + tracks.map(g => {
    const last = g.sessions[g.sessions.length - 1];
    const v = last.laps.filter(l => !l.invalid).map(l => l.total); const b = Math.min(...v);
    return `${g.track} +${(((b - g.wr) / g.wr) * 100).toFixed(2)}% / 帶 ${(median(v) - b).toFixed(3)}s`;
  }).join(' · ') + '<br>原型參考用,確認方向後再整進主站。';
}).catch(e => { document.getElementById('traj').outerHTML = '<div class="loading">讀取失敗:' + e + '</div>'; });
</script>
</body>
</html>
