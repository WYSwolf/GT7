name: Update GT7 Rankings

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小時跑一次
  workflow_dispatch:
    inputs:
      discover:
        description: '列出 board_id（填入 data.json 前先跑一次）'
        type: boolean
        default: false
      dry:
        description: '只顯示，不寫入 data.json'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-rank:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Discover board IDs (one-time setup)
        if: ${{ inputs.discover == true }}
        env:
          GT7_NPSSO: ${{ secrets.GT7_NPSSO }}
        run: python gt7_rank.py --discover

      - name: Fetch rankings and update data.json
        if: ${{ inputs.discover != true }}
        env:
          GT7_NPSSO: ${{ secrets.GT7_NPSSO }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry }}" = "true" ]; then ARGS="--dry"; fi
          python gt7_rank.py $ARGS

      - name: Commit and push if data.json changed
        if: ${{ inputs.discover != true && inputs.dry != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "auto: update GT7 rankings $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git diff HEAD origin/main --quiet || git push
